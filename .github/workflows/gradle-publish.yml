name: Gradle Package

on:
  release:
    types: [created]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # This job is currently disabled as it is not required for an Android APK build
      - name: Build and Publish (Disabled)
        run: echo "Gradle package publishing is disabled for this Android application."