<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />

    <title>Academe - Student Ecosystem | Campus Life Simplified</title>
    <meta name="description" content="Academe is the all-in-one student ecosystem for campus life. Find classes, mark attendance with GPS, discover opportunities, report lost items, and connect with your academic community." />
    <meta name="keywords" content="academe, student app, campus, attendance, lost and found, university, college, Kenya, class management, GPS check-in" />
    <meta name="author" content="Academe" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://academe.app" />

    <!-- Open Graph / Social Media -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://academe.app" />
    <meta property="og:title" content="Academe - Student Ecosystem" />
    <meta property="og:description" content="The all-in-one student ecosystem for campus life." />
    <meta property="og:image" content="https://academe.app/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name" content="Academe" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Academe - Student Ecosystem" />
    <meta name="twitter:description" content="The all-in-one student ecosystem for campus life." />
    <meta name="twitter:image" content="https://academe.app/twitter-card.png" />

    <!-- Theme Colors -->
    <meta name="theme-color" content="#4F46E5" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#1E293B" media="(prefers-color-scheme: dark)" />
    <meta name="color-scheme" content="light dark" />

    <!-- Web App Meta -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Academe" />

    <!-- Icons -->
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <link rel="manifest" href="/manifest.json" />

    <!-- Preconnect to critical third-party origins (improves load time) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
    <link rel="dns-prefetch" href="https://fonts.gstatic.com" />
    <link rel="preconnect" href="https://api.openweathermap.org" crossorigin />
    <link rel="dns-prefetch" href="https://api.openweathermap.org" />

    <!-- Google Fonts - Optimized with display=swap and preload hints -->
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&family=Outfit:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet"
        media="print"
        onload="this.media='all'"
    />
    <noscript>
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&family=Outfit:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap"
            rel="stylesheet"
        />
    </noscript>

    <!-- Preload critical assets -->
    <link rel="preload" as="image" href="/favicon-32x32.png" type="image/png" />

    <!-- Theme initialization script (runs immediately, prevents FOUC) -->
    <script>
        (function() {
            try {
                const theme = localStorage.getItem('academe-theme');
                const systemDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
                const isDark = theme === 'dark' || (theme === 'system' && systemDark);
                if (isDark) {
                    document.documentElement.classList.add('dark');
                } else {
                    document.documentElement.classList.remove('dark');
                }
            } catch(e) {
                // Fallback to system preference
                if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
                    document.documentElement.classList.add('dark');
                }
            }
        })();
    </script>

    <!-- Critical inline CSS for initial paint -->
    <style>
        /* Critical styles for initial render */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* Loading animation */
        @keyframes progress {
            0% { width: 0%; margin-left: 0; }
            50% { width: 70%; margin-left: 15%; }
            100% { width: 0%; margin-left: 100%; }
        }
        
        .animate-progress {
            animation: progress 1.8s ease-in-out infinite;
        }

        /* Prevent FOUC (Flash of Unstyled Content) */
        .no-fouc {
            opacity: 0;
        }
    </style>
</head>

<body class="font-inter antialiased text-gray-900 dark:text-gray-100 bg-white dark:bg-gray-900 transition-colors duration-300">
    <div id="root">
        <!-- Initial loading spinner (replaced by React after hydration) -->
        <div class="min-h-screen flex flex-col items-center justify-center bg-gradient-to-br from-indigo-50 via-white to-purple-50 dark:from-gray-900 dark:via-gray-800 dark:to-gray-900">
            <div class="flex items-center gap-4 mb-10">
                <div class="w-14 h-14 rounded-2xl bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center shadow-lg shadow-indigo-500/30 animate-pulse">
                    <svg class="w-7 h-7 text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-label="Academe logo" role="img">
                        <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
                    </svg>
                </div>
                <div>
                    <h1 class="text-2xl font-extrabold tracking-tight bg-gradient-to-r from-indigo-600 to-purple-600 dark:from-indigo-400 dark:to-purple-400 bg-clip-text text-transparent">
                        Academe
                    </h1>
                    <p class="text-xs text-gray-400 dark:text-gray-500 uppercase tracking-widest font-semibold">
                        Loading...
                    </p>
                </div>
            </div>
            <div class="w-48 h-1 bg-indigo-100 dark:bg-indigo-900/30 rounded-full overflow-hidden">
                <div class="h-full bg-gradient-to-r from-indigo-500 via-purple-500 to-cyan-500 rounded-full animate-progress" style="width: 0%"></div>
            </div>
        </div>
    </div>

    <!-- Noscript fallback -->
    <noscript>
        <div style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;text-align:center;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:linear-gradient(135deg,#f0f4ff,#fafafa,#f5f0ff);color:#1f2937">
            <div style="width:72px;height:72px;background:linear-gradient(135deg,#6366f1,#8b5cf6);border-radius:20px;display:flex;align-items:center;justify-content:center;margin-bottom:24px;box-shadow:0 8px 32px rgba(99,102,241,0.25)">
                <span style="font-size:32px;color:white" aria-label="Academe logo">⚡</span>
            </div>
            <h1 style="font-size:1.5rem;font-weight:700;margin-bottom:8px">JavaScript Required</h1>
            <p style="font-size:0.95rem;color:#6b7280;max-width:400px;line-height:1.6">
                Academe requires JavaScript to run. Please enable JavaScript in your browser settings.
            </p>
        </div>
    </noscript>

    <!-- Main entry point -->
    <script type="module" src="/src/main.jsx"></script>

    <!-- Optional: Register Service Worker for PWA capabilities -->
    <script>
        if ('serviceWorker' in navigator && import.meta.env.PROD) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then(registration => {
                        console.log('SW registered: ', registration);
                    })
                    .catch(registrationError => {
                        console.log('SW registration failed: ', registrationError);
                    });
            });
        }
    </script>
</body>
</html>
